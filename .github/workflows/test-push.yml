name: Test Push

on:
  push:
    branches: ['workflows/tests/push/**']

permissions:
  contents: read
  checks: read

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test_with_more_than_300_files_in_push:
    name: Test with >300 Files in Push
    if: ${{ !github.event.created }}
    runs-on: ubuntu-latest
    outputs:
      check-run-id: ${{ steps.set-check-run-id.outputs.check-run-id }}

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          check-latest: true
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Test
        uses: ./
        env:
          DEBUG: 'eslint:cli-engine'
        with:
          targets: src/__tests__/bulk/*.js

      - name: Set check run id
        id: set-check-run-id
        run: echo "check-run-id=${{ job.check_run_id }}" >> $GITHUB_OUTPUT

  verify_test_with_more_than_300_files_in_push:
    name: Verify >300 Files in Push
    runs-on: ubuntu-latest
    needs: test_with_more_than_300_files_in_push
    steps:
      - name: Verify
        env:
          REPO: ${{ github.repository }}
          CHECK_RUN_ID: ${{ needs.test_with_more_than_300_files_in_push.outputs.check-run-id }}
          FAILING_FILE_PATH: src/__tests__/bulk/zzzz-failing.js
        run: |
          echo "::notice::Check run ID is $CHECK_RUN_ID"

          ANNOTATIONS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$REPO/check-runs/$CHECK_RUN_ID/annotations")
          HAS_FAILING_FILE_ANNOTATION=$(echo "$ANNOTATIONS" | jq --arg failing_file_path "$FAILING_FILE_PATH" 'any(.[]; .path == $failing_file_path)')

          if [[ "$HAS_FAILING_FILE_ANNOTATION" != "true" ]]
          then
            echo "::error::Expected annotations on $FAILING_FILE_PATH"
            exit 1
          fi
